<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gatesland Capital</title>
  <link rel="icon" href="gatesland.ico" sizes="any">
  <style>
    :root {
      --page-bg: #171a1f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(24px, 5vw, 72px);
      background: var(--page-bg);
      font-family: Helvetica, Arial, sans-serif;
    }

    .logo-wrap {
      width: min(100%, 760px);
      display: grid;
      place-items: center;
    }

    .logo {
      display: none;
      width: min(100%, clamp(220px, 48vw, 560px));
      max-height: min(28vh, 240px);
      object-fit: contain;
      object-position: center;
    }
  </style>
</head>
<body>
  <main class="logo-wrap">
    <img
      class="logo"
      id="logo"
      alt="Gatesland logo"
      src=""
    >
  </main>

  <script>
    const logo = document.getElementById("logo");
    const candidates = ["gatesland-logo.svg", "gatesland-logo.png"];

    function loadLogo(index) {
      if (index >= candidates.length) {
        return;
      }

      const candidate = candidates[index];
      const testImage = new Image();

      testImage.onload = function () {
        logo.src = candidate;
        logo.style.display = "block";
      };

      testImage.onerror = function () {
        loadLogo(index + 1);
      };

      testImage.src = candidate;
    }

    loadLogo(0);
  </script>
</body>
</html>
